

<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>المضاعين من السمرة من جهينة</title>

<script src="https://cdn.jsdelivr.net/npm/@balkangraph/familytree.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {font-family: Tahoma; direction: rtl; background:#0f172a; color:white;}
header {background:#020617; padding:15px; text-align:center;}
#tree {height:600px; background:white;}
</style>

</head>
<body>

<header>👑 المضاعين من السمرة من جهينة</header>

<input id="name" placeholder="الاسم">
<input id="father" placeholder="ID الأب">
<button onclick="addPerson()">إضافة</button>

<div id="tree"></div>

<script>

const supabaseClient = supabase.createClient(
  "yqlxxmavorztfnegnpsr",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxbHh4bWF2b3J6dGZuZWducHNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODUyODksImV4cCI6MjA4OTg2MTI4OX0.EM-PvtwRe6XChjw4CEExV9LqGlLMI0VDZ_1GQENRBRY"
);

async function loadTree(){
    let { data } = await supabaseClient.from("persons").select("*");

    new FamilyTree(document.getElementById("tree"), {
        nodes: data.map(p => ({
            id: p.id,
            pids: p.father ? [p.father] : [],
            name: p.name
        }))
    });
}

async function addPerson(){
    await supabaseClient.from("persons").insert([{
        name: document.getElementById("name").value,
        father: document.getElementById("father").value || null
    }]);

    loadTree();
}

loadTree();

</script>

</body>
</html>
